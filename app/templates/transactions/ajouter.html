{% extends 'base.html' %}
{% block content %}

<div class="mb-4">
    <a href="{{ url_for('transactions.liste') }}" class="btn btn-outline-secondary btn-sm mb-3">
        <i class="bi bi-arrow-left me-1"></i> Retour
    </a>
    <h2 class="fw-bold">Ajouter une transaction</h2>
    <p class="text-muted">Enregistrez un revenu ou une dépense</p>
</div>

<div class="card p-4" style="max-width: 600px;">
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
            <label class="form-label fw-semibold">Type de transaction</label>
            <div class="d-flex gap-3">
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="type" value="revenu" id="revenu" checked>
                    <label class="form-check-label text-success fw-semibold" for="revenu">
                        <i class="bi bi-arrow-up-circle me-1"></i> Revenu
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="type" value="depense" id="depense">
                    <label class="form-check-label text-danger fw-semibold" for="depense">
                        <i class="bi bi-arrow-down-circle me-1"></i> Dépense
                    </label>
                </div>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold">Titre</label>
            <input type="text" name="titre" class="form-control" placeholder="Ex: Salaire du mois" required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold">Montant (FCFA)</label>
            <input type="number" name="montant" class="form-control" placeholder="Ex: 150000" min="0" step="1" required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold">Catégorie</label>
            <select name="categorie" class="form-select" required>
                <optgroup label="Revenus">
                    <option value="Salaire">Salaire</option>
                    <option value="Dividendes">Dividendes</option>
                    <option value="Loyers perçus">Loyers perçus</option>
                    <option value="Freelance">Freelance</option>
                    <option value="Autres revenus">Autres revenus</option>
                </optgroup>
                <optgroup label="Dépenses">
                    <option value="Alimentation">Alimentation</option>
                    <option value="Transport">Transport</option>
                    <option value="Logement">Logement</option>
                    <option value="Santé">Santé</option>
                    <option value="Éducation">Éducation</option>
                    <option value="Loisirs">Loisirs</option>
                    <option value="Autres dépenses">Autres dépenses</option>
                </optgroup>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold">Date</label>
            <input type="date" name="date" class="form-control" required>
        </div>

        <div class="mb-4">
            <label class="form-label fw-semibold">Note (optionnel)</label>
            <textarea name="note" class="form-control" rows="2" placeholder="Remarque ou détail..."></textarea>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4">
                <i class="bi bi-check-lg me-1"></i> Enregistrer
            </button>
            <a href="{{ url_for('transactions.liste') }}" class="btn btn-outline-secondary px-4">Annuler</a>
        </div>
    </form>
</div>

{% endblock %}
