{% extends 'base.html' %}
{% block content_unauth %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background: linear-gradient(135deg, #1a1a2e, #7c3aed);">
    <div class="card p-4" style="width: 100%; max-width: 420px;">
        <div class="text-center mb-4">
            <h2 class="fw-bold" style="color: #7c3aed;">Créer un compte</h2>
            <p class="text-muted">Rejoignez Marc Aurel Invest</p>
        </div>
        <form method="POST">
             <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label fw-semibold">Nom d'utilisateur</label>
                <input type="text" name="username" class="form-control" placeholder="Votre nom" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" name="email" class="form-control" placeholder="votre@email.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Mot de passe</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                <i class="bi bi-person-plus me-2"></i>Créer mon compte
            </button>
        </form>
        <hr>
        <p class="text-center text-muted mb-0">
            Déjà un compte ?
            <a href="{{ url_for('auth.login') }}" style="color: #7c3aed;">Se connecter</a>
        </p>
    </div>
</div>
{% endblock %}
