{% extends 'base.html' %}
{% block content %}

<div class="mb-4">
    <a href="{{ url_for('budget.liste') }}" class="btn btn-outline-secondary btn-sm mb-3">
        <i class="bi bi-arrow-left me-1"></i> Retour
    </a>
    <h2 class="fw-bold">Ajouter un budget</h2>
    <p class="text-muted">Définissez une limite de dépenses par catégorie</p>
</div>

<div class="card p-4" style="max-width: 600px;">
    <form method="POST">
         <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
            <label class="form-label fw-semibold">Catégorie</label>
            <select name="categorie" class="form-select" required>
                <option value="Alimentation">Alimentation</option>
                <option value="Transport">Transport</option>
                <option value="Logement">Logement</option>
                <option value="Santé">Santé</option>
                <option value="Éducation">Éducation</option>
                <option value="Loisirs">Loisirs</option>
                <option value="Autres dépenses">Autres dépenses</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold">Limite (FCFA)</label>
            <input type="number" name="limite" class="form-control"
                   placeholder="Ex: 50000" min="0" step="1" required>
        </div>

        <div class="row mb-4">
            <div class="col">
                <label class="form-label fw-semibold">Mois</label>
                <select name="mois" class="form-select" required>
                    <option value="1">Janvier</option>
                    <option value="2">Février</option>
                    <option value="3">Mars</option>
                    <option value="4">Avril</option>
                    <option value="5">Mai</option>
                    <option value="6">Juin</option>
                    <option value="7">Juillet</option>
                    <option value="8">Août</option>
                    <option value="9">Septembre</option>
                    <option value="10">Octobre</option>
                    <option value="11">Novembre</option>
                    <option value="12">Décembre</option>
                </select>
            </div>
            <div class="col">
                <label class="form-label fw-semibold">Année</label>
                <input type="number" name="annee" class="form-control"
                       value="2026" min="2024" max="2030" required>
            </div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4">
                <i class="bi bi-check-lg me-1"></i> Enregistrer
            </button>
            <a href="{{ url_for('budget.liste') }}" class="btn btn-outline-secondary px-4">Annuler</a>
        </div>
    </form>
</div>

{% endblock %}
